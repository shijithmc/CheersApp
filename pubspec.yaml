name: cheers_app
description: Hyper-local nightlife & hospitality discovery platform for Kozhikode
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.1.0
  shared_preferences: ^2.3.0
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.1
  share_plus: ^10.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
